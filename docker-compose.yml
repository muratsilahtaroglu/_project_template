# Generic multi-service skeleton — keep only the services this project needs (bootstrap, rules.md §0.0).
# Secrets come from .env via env_file (never baked into the image; see .dockerignore).

services:
  app:
    build: .
    env_file: .env
    ports:
      - "${API_PORT}:${API_PORT}"
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

